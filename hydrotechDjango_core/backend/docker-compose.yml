version: '3.8'

services:
  db:
    image: postgres:15
    container_name: hydrotech_db
    environment:
      POSTGRES_DB: hydrotech_db
      POSTGRES_USER: hydrotech_user
      POSTGRES_PASSWORD: hydrotech_password_change_this
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydrotech_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: hydrotech_backend
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      DEBUG: "False"
      SECRET_KEY: your-secret-key-change-this
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0
      DATABASE_ENGINE: django.db.backends.postgresql
      DATABASE_NAME: hydrotech_db
      DATABASE_USER: hydrotech_user
      DATABASE_PASSWORD: hydrotech_password_change_this
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - hydrotech_network

volumes:
  postgres_data:

networks:
  hydrotech_network:
    driver: bridge
